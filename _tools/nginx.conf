worker_processes  1;

events {
    worker_connections  1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;

            # 自动录像
            record all;
            record_path temp/recordings;
            record_suffix -%Y%m%d-%H%M%S.flv;
            record_unique on;

            hls on;
            hls_path temp/hls;
            hls_fragment 2s;
            hls_playlist_length 10s;
        }
    }
}

http {
    server {
        listen 8080;

        # HLS 播放地址
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root temp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # 录像文件直接访问
        location /recordings {
            root temp;
            add_header Access-Control-Allow-Origin *;
        }

        # 查看直播状态
        location /stat {
            rtmp_stat all;
        }
    }
}
